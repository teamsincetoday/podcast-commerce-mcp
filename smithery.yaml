# Smithery listing for podcast-commerce-mcp
# Place this as smithery.yaml in the package root before publishing to Smithery

startCommand:
  type: stdio
  configSchema:
    type: object
    required:
      - openaiApiKey
    properties:
      openaiApiKey:
        type: string
        description: OpenAI API key for GPT-4o-mini product extraction
      apiKeys:
        type: string
        description: Comma-separated paid API keys (unlocks unlimited calls)
      cacheDir:
        type: string
        description: SQLite cache path (default ./data/cache.db)
  commandFunction: |-
    (config) => ({
      command: "npx",
      args: ["podcast-commerce-mcp"],
      env: {
        OPENAI_API_KEY: config.openaiApiKey,
        MCP_API_KEYS: config.apiKeys ?? "",
        CACHE_DIR: config.cacheDir ?? "./data/cache.db",
      }
    })

# --- Smithery Marketplace Metadata ---
# (These fields are configured via the Smithery web UI, not this file)
# name: podcast-commerce-mcp
# display_name: Podcast Commerce Intelligence
# tagline: Extract product mentions, sponsors, and trends from podcast transcripts
