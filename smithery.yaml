#   Give it a podcast transcript. It extracts every commercially interesting product,
#   brand, and sponsor mention — with speaker attribution, confidence scores, and
#   recommendation strength.
#
#   3 MCP tools for podcast commerce intelligence:
#   - extract_podcast_products: Full product extraction with NER, speaker attribution,
#     sentiment scoring, and category classification (SaaS, physical goods, courses, etc.)
