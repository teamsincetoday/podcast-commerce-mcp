name = "podcast-commerce-mcp"
main = "src/worker.ts"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

# Payment disabled by default — enable when x402 Cloudflare integration is ready
[vars]
PAYMENT_ENABLED = "false"

# KV Namespaces — create with:
#   wrangler kv namespace create PODCAST_CACHE
#   wrangler kv namespace create RATE_LIMITS
# Then replace REPLACE_WITH_KV_ID below with the IDs from the output.
[[kv_namespaces]]
binding = "PODCAST_CACHE"
id = "REPLACE_WITH_KV_ID"

[[kv_namespaces]]
binding = "RATE_LIMITS"
id = "REPLACE_WITH_KV_ID"

# Secrets — set with:
#   wrangler secret put OPENAI_API_KEY
#   wrangler secret put MCP_API_KEYS   (comma-separated list of valid keys)
